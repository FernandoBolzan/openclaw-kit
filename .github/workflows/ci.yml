name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate repository
        run: python3 tools/validate.py --path .
      - name: Install into temp target
        run: python3 tools/install.py --target "$RUNNER_TEMP/openclaw"
      - name: Validate installed target
        run: python3 tools/validate.py --path . --installed-target "$RUNNER_TEMP/openclaw"
