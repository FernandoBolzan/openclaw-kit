name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate repository
        run: python3 tools/validate.py --path .
      - name: Dry-run install
        run: bash install.sh --target "$HOME/.openclaw" --dry-run

